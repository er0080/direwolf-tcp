##################################################################
# Direwolf Icom IC-9700
# KISS TCP: 8001   AGW TCP: 8000
# Audio: routed by setup.sh via pactl after launch
##################################################################

AGWPORT 8000
KISSPORT 8001

ADEVICE plughw:CARD=CODEC_9700,DEV=0
ARATE    48000

PTT /dev/ic_9700_b DTR

CHANNEL 0
MYCALL  KD2MYS-5
MODEM 2400
TXDELAY 20
TXTAIL  10
PACLEN  512
RETRY 3
FRACK 3
MAXFRAME 7
EMAXFRAME 63
DWAIT 0
IL2PTX 1
