##################################################################
# Direwolf Icom IC-7300
# KISS TCP: 8101   AGW TCP: 8100
# Audio: routed by setup.sh via pactl after launch
##################################################################

AGWPORT 8100
KISSPORT 8101

ADEVICE plughw:CARD=CODEC_7300,DEV=0
ARATE    48000

PTT /dev/ic_7300 DTR

CHANNEL 0
MYCALL  KD2MYS-6
MODEM 2400
TXDELAY 20
TXTAIL  10
PACLEN  512
RETRY 3
FRACK 3
MAXFRAME 7
EMAXFRAME 63
DWAIT 0
IL2PTX 1
