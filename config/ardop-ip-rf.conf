# config/ardop-ip-rf.conf — RF deployment config for ardop-ip (IC-705 ↔ IC-7300)
#
# Sourced by scripts/rf-*.sh.  Shell variable syntax.

# ── IC-705 side (ISS — initiates ARQ) ─────────────────────────────────────────
IC705_AUDIO=plughw:CARD=CODEC_705,DEV=0
IC705_CIV_PORT=/dev/ic_705_a
IC705_CIV_ADDR=0xA4
IC705_CIV_BAUD=115200
IC705_MYCALL=KD2MYS-5
IC705_IP=10.0.0.1
IC705_TUN=ardop0

# ── IC-7300 side (IRS — listens) ──────────────────────────────────────────────
IC7300_AUDIO=plughw:CARD=CODEC_7300,DEV=0
IC7300_CIV_PORT=/dev/ic_7300
IC7300_CIV_ADDR=0x94
IC7300_CIV_BAUD=115200
IC7300_MYCALL=KD2MYS-6
IC7300_IP=10.0.0.2
IC7300_TUN=ardop1

# ── Link parameters ───────────────────────────────────────────────────────────
FREQ_HZ=14103000
BANDWIDTH=2500
MTU=1460
