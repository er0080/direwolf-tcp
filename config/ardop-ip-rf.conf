# config/ardop-ip-rf.conf — RF deployment config for ardop-ip (IC-705 ↔ IC-7300)
#
# Sourced by scripts/rf-*.sh.  Shell variable syntax.

# ── IC-705 side (ISS — initiates ARQ) ─────────────────────────────────────────
IC705_AUDIO=plughw:CARD=CODEC_705,DEV=0
IC705_CIV_PORT=/dev/ic_705_a
IC705_CIV_ADDR=0xA4
IC705_CIV_BAUD=115200
IC705_MYCALL=KD2MYS-5
IC705_IP=10.0.0.1
IC705_TUN=ardop0

# ── IC-7300 side (IRS — listens) ──────────────────────────────────────────────
IC7300_AUDIO=plughw:CARD=CODEC_7300,DEV=0
IC7300_CIV_PORT=/dev/ic_7300
IC7300_CIV_ADDR=0x94
IC7300_CIV_BAUD=115200
IC7300_MYCALL=KD2MYS-6
IC7300_IP=10.0.0.2
IC7300_TUN=ardop1

# ── Link parameters ───────────────────────────────────────────────────────────
FREQ_HZ=14103000
# BANDWIDTH: 200 | 500 | 2500 | 3000 (Phase 6.4).
#   2500 (default)  — 43 OFDM carriers, interoperates with stock ARDOP.
#   3000            — Phase 6.4 wide mode, 54 OFDM carriers, ~2944 Hz
#                     occupied.  Requires an SSB TX filter >= 2.8 kHz on
#                     BOTH radios.  The IC-705 and IC-7300 max their SSB
#                     TX filter around 3.0 kHz; at BW=3000 the lowest and
#                     highest edge carriers will be attenuated/clipped on
#                     these radios and may drop on marginal paths.
#                     Use a modded IC-7610 / SDR transceiver with a
#                     3 kHz+ filter for clean operation.  3600 is
#                     accepted as a marketing alias for the same mode.
BANDWIDTH=2500
MTU=1460
