##################################################################
# Direwolf Icom IC-705
# KISS TCP: 8001   AGW TCP: 8000
# Audio: routed by setup.sh via pactl after launch
##################################################################

AGWPORT 8000
KISSPORT 8001

ADEVICE plughw:CARD=CODEC_705,DEV=0
ARATE    48000

PTT /dev/ic_705_b DTR

CHANNEL 0
MYCALL  KD2MYS-5
MODEM 2400
TXDELAY 20
TXTAIL  10
PACLEN  512
RETRY 3
FRACK 3
MAXFRAME 7
EMAXFRAME 63
DWAIT 5
IL2PTX 1
PERSIST 255
SLOTTIME 1
