##################################################################
# Direwolf RF Configuration Template
# For a dedicated point-to-point half-duplex RF link.
#
# Deploy one copy of this file on each station.
# Customise: MYCALL, ADEVICE, ARATE, and PTT for your hardware.
#
# This file is NOT used by the virtual test framework (setup.sh).
# That framework uses dw-a.conf / dw-b.conf instead.
##################################################################

# ------------------------------------------------------------------
# Audio device
# Replace with your actual sound card. Use "aplay -l" and "arecord -l"
# to list available devices. Common examples:
#
#   ADEVICE  plughw:1,0  plughw:1,0   # USB audio dongle (hw:1)
#   ADEVICE  plughw:0,0  plughw:0,0   # built-in card (hw:0)
#
# TX (first) and RX (second) can differ if using separate devices.
# ------------------------------------------------------------------
ADEVICE  plughw:1,0  plughw:1,0

# Match your sound card's native sample rate to avoid resampling.
# 48000 Hz is common for USB audio; built-in cards often use 44100.
# Check with: cat /proc/asound/card1/codec#0 | grep "Default PCM"
ARATE    48000

# ------------------------------------------------------------------
# Channel and station identity
# ------------------------------------------------------------------
CHANNEL 0
MYCALL  N0CALL-1          # ← change to your callsign

MODEM   1200              # Bell 202 AFSK 1200 baud

# ------------------------------------------------------------------
# Transmit timing
#
# TXDELAY: milliseconds/10 from PTT-assert to first audio bit.
#   Most modern radios: 200 ms (TXDELAY 20).
#   Slow-switching or older radios: 300–500 ms (TXDELAY 30–50).
#   Tune down if you see the first few bits of each frame dropped.
#
# TXTAIL: milliseconds/10 of extra audio after last bit before PTT drops.
#   50 ms (TXTAIL 5) is a safe starting point.
#   Increase if the receiving end misses the final bytes of frames.
# ------------------------------------------------------------------
TXDELAY 20
TXTAIL  5

# ------------------------------------------------------------------
# CSMA (collision avoidance) — tuned for dedicated point-to-point
#
# PERSIST 255: transmit immediately whenever the channel is clear.
#   On a shared channel you would lower this (e.g. 63) so multiple
#   stations back off randomly. On a dedicated P2P link there is no
#   other traffic to collide with, so 255 eliminates needless wait.
#
# SLOTTIME 1 (10 ms): a minimal slot adds a tiny timing jitter so
#   that if both ends happen to see the channel go clear at exactly
#   the same moment (e.g. during a TCP bulk transfer) they don't
#   both start transmitting in the same audio sample.
#   For shared channels increase to 10–20 (100–200 ms).
# ------------------------------------------------------------------
PERSIST  255
SLOTTIME 1

# ------------------------------------------------------------------
# Frame size
# Must satisfy: PACLEN = tncattach --mtu + 4
# If you change --mtu on tncattach, update PACLEN here to match.
# ------------------------------------------------------------------
PACLEN   240

# ------------------------------------------------------------------
# PTT (Push-To-Talk) — uncomment ONE of the following methods.
#
# Serial port RTS (most common with a USB-serial cable):
#   PTT  /dev/ttyUSB0  RTS
#   PTT  /dev/ttyUSB0  RTS -    # add "-" to invert polarity
#
# Serial port DTR:
#   PTT  /dev/ttyUSB0  DTR
#
# GPIO (Raspberry Pi or similar single-board computer):
#   PTT  GPIO 17               # BCM pin 17
#   PTT  GPIO -18              # BCM pin 18, active-low
#
# CM108/CM119 USB audio chip GPIO (all-in-one solution):
#   PTT  CM108
#
# VOX (radio keyed by audio presence — generally unreliable for packet):
#   (leave PTT unconfigured; enable VOX on the radio itself)
# ------------------------------------------------------------------
# PTT  /dev/ttyUSB0  RTS

# ------------------------------------------------------------------
# Server ports (one Direwolf instance per station in RF deployment)
# ------------------------------------------------------------------
AGWPORT 8000
KISSPORT 8001
