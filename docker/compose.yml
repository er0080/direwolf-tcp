name: dwiface

# Two isolated containers that communicate ONLY over the real RF link.
# network_mode: none — no Docker bridge between them.
# Each container gets its radio's USB audio and PTT serial passed through.
#
# Run docker/setup.sh first to install docker, generate SSH keys, and build
# the image (which builds and installs the dw-iface .deb as proof of packaging).
#
# Device paths — adjust if your radios appear on different nodes:
#   PTT serial: find with  ls -la /dev/ic_705_b /dev/ic_7300
#   USB audio:  /dev/snd is bind-mounted whole — config picks by card name
#
# To override device paths without editing this file, set env vars:
#   IC705_PTT=/dev/ttyACM2   IC7300_PTT=/dev/ttyUSB2  docker compose up

services:
  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dwiface-node
    container_name: dwiface-node-a
    network_mode: "none"
    cap_add:
      - NET_ADMIN
    # /dev/snd: whole ALSA tree — direwolf selects its card by name in config
    volumes:
      - /dev/snd:/dev/snd
      - ./config/node-a.conf:/etc/dw-iface/dw-iface.conf:ro
      - ./keys/id_ed25519:/root/.ssh/id_ed25519:ro
      - ./keys/id_ed25519.pub:/root/.ssh/authorized_keys:ro
    devices:
      # IC-705 PTT via CI-V / USB-serial — host symlink maps to real ttyACM*
      - ${IC705_PTT:-/dev/ic_705_b}:/dev/ic_705_b
    environment:
      NODE_ROLE: a
    restart: "no"

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dwiface-node
    container_name: dwiface-node-b
    network_mode: "none"
    cap_add:
      - NET_ADMIN
    volumes:
      - /dev/snd:/dev/snd
      - ./config/node-b.conf:/etc/dw-iface/dw-iface.conf:ro
      - ./keys/id_ed25519.pub:/root/.ssh/authorized_keys:ro
    devices:
      # IC-7300 PTT via USB-serial
      - ${IC7300_PTT:-/dev/ic_7300}:/dev/ic_7300
    environment:
      NODE_ROLE: b
    restart: "no"
