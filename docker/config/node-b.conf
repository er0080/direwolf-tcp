# dw-iface config for Docker node-b — Icom IC-7300
# Bind-mounted into container at /etc/dw-iface/dw-iface.conf

MYCALL="NE2H-6"
AUDIO_DEVICE="plughw:CARD=CODEC_7300,DEV=0"
AUDIO_RATE=48000
PTT="/dev/ic_7300 DTR"

MODEM=2400
TXDELAY=20
TXTAIL=10
IL2PTX=1

PERSIST=127
SLOTTIME=5
DWAIT=5

PACLEN=512
MAXFRAME=7
EMAXFRAME=63
FRACK=3
RETRY=3

IP_ADDR="10.0.0.2/30"
MTU=508
IFACE=tnc0
KISS_PORT=8001
