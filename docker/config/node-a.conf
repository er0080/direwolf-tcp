# dw-iface config for Docker node-a — Icom IC-705
# Bind-mounted into container at /etc/dw-iface/dw-iface.conf

MYCALL="NE2H-5"
AUDIO_DEVICE="plughw:CARD=CODEC_705,DEV=0"
AUDIO_RATE=48000
PTT="/dev/ic_705_b DTR"

MODEM=2400
TXDELAY=20
TXTAIL=10
IL2PTX=1

PERSIST=127
SLOTTIME=5
DWAIT=25

PACLEN=512
MAXFRAME=7
EMAXFRAME=63
FRACK=3
RETRY=3

IP_ADDR="10.0.0.1/30"
MTU=508
IFACE=tnc0
KISS_PORT=8001
