events { worker_connections 64; }

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80 default_server;

        location / {
            return 200 "dw-iface node-b OK\n";
            add_header Content-Type text/plain;
        }

        location /index.html {
            return 200 "dw-iface node-b OK\n";
            add_header Content-Type text/plain;
        }
    }
}
